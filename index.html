<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Board Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
        }
        
        .section h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .checkbox-item:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .checkbox-item.selected {
            border-color: #667eea;
            background: #e6e9ff;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .required::after {
            content: "*";
            color: #ff4444;
            margin-left: 4px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid white;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            display: none;
            z-index: 1001;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast.success {
            background: #4CAF50;
        }
        
        .toast.error {
            background: #f44336;
        }
        
        .toast.show {
            display: block;
        }
        
        @media (max-width: 600px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Editorial Board Application</h1>
            <p>Join us as Associate Editor, Guest Editor, or Reviewer</p>
        </div>
        
        <div class="form-container">
            <form id="applicationForm">
                <!-- Positions -->
                <div class="section">
                    <h3>📌 Select Positions (Tick any)</h3>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="positions" value="Associate Editor">
                            <span>👥 Associate Editor</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="positions" value="Guest Editor">
                            <span>📝 Guest Editor</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="positions" value="Reviewer">
                            <span>🔍 Reviewer</span>
                        </label>
                    </div>
                </div>
                
                <!-- Journals -->
                <div class="section">
                    <h3>📚 Select Journals (Tick any)</h3>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="journals" value="IJSSR (2583-7877)">
                            <span>🌍 Science & Social Science (2583-7877)</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="journals" value="IJSESR (3049-2793)">
                            <span>⚙️ Science & Engineering (3049-2793)</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="journals" value="IJEIR (3049-4052)">
                            <span>🎓 Educational Innovations (3049-4052)</span>
                        </label>
                    </div>
                </div>
                
                <!-- Personal Info -->
                <div class="section">
                    <h3>👤 Personal Information</h3>
                    <div class="grid-2">
                        <div class="form-group full-width">
                            <label class="required">Full Name</label>
                            <input type="text" name="fullName" id="fullName" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="required">Email</label>
                            <input type="email" name="email" id="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="phone" id="phone">
                        </div>
                        
                        <div class="form-group">
                            <label>ORCID</label>
                            <input type="text" name="orcid" id="orcid" placeholder="0000-0002-1825-0097">
                        </div>
                    </div>
                </div>
                
                <!-- Professional Info -->
                <div class="section">
                    <h3>🏛️ Professional Information</h3>
                    <div class="grid-2">
                        <div class="form-group full-width">
                            <label class="required">Affiliation/Institution</label>
                            <input type="text" name="affiliation" id="affiliation" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="required">Department</label>
                            <input type="text" name="department" id="department" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="required">Designation</label>
                            <input type="text" name="designation" id="designation" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="required">Country</label>
                            <input type="text" name="country" id="country" required>
                        </div>
                    </div>
                </div>
                
                <!-- Academic -->
                <div class="section">
                    <h3>🎓 Academic Qualifications</h3>
                    <div class="grid-3">
                        <div class="form-group">
                            <label class="required">Highest Degree</label>
                            <select name="highestDegree" id="highestDegree" required>
                                <option value="">Select</option>
                                <option value="PhD">PhD</option>
                                <option value="MD">MD</option>
                                <option value="Master's">Master's</option>
                                <option value="Bachelor's">Bachelor's</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>PhD Year</label>
                            <input type="text" name="phdYear" id="phdYear" placeholder="2020">
                        </div>
                        
                        <div class="form-group">
                            <label class="required">Total Publications</label>
                            <input type="number" name="totalPublications" id="totalPublications" required min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>H-index</label>
                            <input type="number" name="hindex" id="hindex" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Total Citations</label>
                            <input type="number" name="citations" id="citations" min="0">
                        </div>
                    </div>
                </div>
                
                <!-- Experience -->
                <div class="section">
                    <h3>💼 Experience</h3>
                    <div class="grid-3">
                        <div class="form-group">
                            <label>Review Experience (Years)</label>
                            <input type="number" name="reviewExperience" id="reviewExperience" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Editor Experience (Years)</label>
                            <input type="number" name="editorExperience" id="editorExperience" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Guest Editor (Years)</label>
                            <input type="number" name="guestEditorExperience" id="guestEditorExperience" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Previous Reviews (Count)</label>
                            <input type="number" name="previousReviews" id="previousReviews" min="0">
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Previous Editorial Boards</label>
                            <textarea name="previousBoards" id="previousBoards" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Expertise -->
                <div class="section">
                    <h3>🔬 Areas of Expertise</h3>
                    <div class="grid-3">
                        <div class="form-group">
                            <label class="required">Area 1</label>
                            <input type="text" name="expertise1" id="expertise1" required>
                        </div>
                        <div class="form-group">
                            <label class="required">Area 2</label>
                            <input type="text" name="expertise2" id="expertise2" required>
                        </div>
                        <div class="form-group">
                            <label class="required">Area 3</label>
                            <input type="text" name="expertise3" id="expertise3" required>
                        </div>
                    </div>
                </div>
                
                <!-- Additional -->
                <div class="section">
                    <h3>📎 Additional Information</h3>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Availability (Papers/month)</label>
                            <select name="availability" id="availability">
                                <option value="">Select</option>
                                <option value="1-2">1-2 papers/month</option>
                                <option value="3-4">3-4 papers/month</option>
                                <option value="5+">5+ papers/month</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>CV/Resume Link</label>
                            <input type="url" name="cvLink" id="cvLink" placeholder="Google Drive/Dropbox link">
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Additional Comments</label>
                            <textarea name="comments" id="comments" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" id="submitBtn">📤 Submit Application</button>
            </form>
        </div>
    </div>
    
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // YAHAN APNA GOOGLE APPS SCRIPT URL DAALO
        const APPS_SCRIPT_URL = 'YAHAN_APNA_URL_DAALO';
        
        // Checkbox select effect
        document.querySelectorAll('.checkbox-item').forEach(item => {
            const checkbox = item.querySelector('input[type="checkbox"]');
            
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        });
        
        // Form submit
        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get selected positions
            const positions = [];
            document.querySelectorAll('input[name="positions"]:checked').forEach(cb => {
                positions.push(cb.value);
            });
            
            // Get selected journals
            const journals = [];
            document.querySelectorAll('input[name="journals"]:checked').forEach(cb => {
                journals.push(cb.value);
            });
            
            // Validation
            if (positions.length === 0) {
                showToast('Please select at least one position!', 'error');
                return;
            }
            
            if (journals.length === 0) {
                showToast('Please select at least one journal!', 'error');
                return;
            }
            
            // Form data
            const formData = {
                positions: positions,
                journals: journals,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                orcid: document.getElementById('orcid').value,
                affiliation: document.getElementById('affiliation').value,
                department: document.getElementById('department').value,
                designation: document.getElementById('designation').value,
                country: document.getElementById('country').value,
                highestDegree: document.getElementById('highestDegree').value,
                phdYear: document.getElementById('phdYear').value,
                totalPublications: document.getElementById('totalPublications').value,
                hindex: document.getElementById('hindex').value,
                citations: document.getElementById('citations').value,
                reviewExperience: document.getElementById('reviewExperience').value,
                editorExperience: document.getElementById('editorExperience').value,
                guestEditorExperience: document.getElementById('guestEditorExperience').value,
                previousReviews: document.getElementById('previousReviews').value,
                previousBoards: document.getElementById('previousBoards').value,
                expertise1: document.getElementById('expertise1').value,
                expertise2: document.getElementById('expertise2').value,
                expertise3: document.getElementById('expertise3').value,
                availability: document.getElementById('availability').value,
                cvLink: document.getElementById('cvLink').value,
                comments: document.getElementById('comments').value
            };
            
            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('submitBtn').disabled = true;
            
            try {
                // Send to Google Sheets
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                showToast('✅ Application submitted successfully!', 'success');
                document.getElementById('applicationForm').reset();
                
                // Remove selected class from checkboxes
                document.querySelectorAll('.checkbox-item').forEach(item => {
                    item.classList.remove('selected');
                });
                
            } catch (error) {
                showToast('❌ Error submitting form. Please try again.', 'error');
                console.error(error);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;
            }
        });
        
        // Toast function
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
